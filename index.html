<!DOCTYPE html>
<html>

<head>
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="OIP.webp">
</head>

<body>

    <div class="container">
        <h1>Weather App</h1>

        <input type="text" id="cityInput" placeholder="Enter city name">
        <button onclick="getWeather()">Search</button>

        <div class="result">
            <h2 id="cityName"></h2>
            <p id="temperature"></p>
            <p id="condition"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
